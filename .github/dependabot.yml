version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    reviewers:
      - Kris1027
    labels:
      - dependencies
    groups:
      minor-and-patch-prod:
        dependency-type: production
        update-types:
          - minor
          - patch
      minor-and-patch-dev:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    reviewers:
      - Kris1027
    labels:
      - dependencies
